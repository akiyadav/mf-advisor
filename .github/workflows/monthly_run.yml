name: MF AI Advisor — Monthly Run

on:
  schedule:
    - cron: '30 2 28-31 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-mf-advisor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-generativeai python-dotenv

      - name: Check if today is last day of month
        id: check_date
        run: |
          python3 -c "
          import datetime, os
          today = datetime.date.today()
          last_day = (today.replace(day=1) + datetime.timedelta(days=32)).replace(day=1) - datetime.timedelta(days=1)
          is_last = today == last_day
          print(f'Today: {today} | Last day: {last_day} | Is last day: {is_last}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'is_last_day={str(is_last).lower()}\n')
          "

      - name: Run MF AI Engine
        if: steps.check_date.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY : ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: akiyadav
          GITHUB_REPO: mf-advisor
        run: |
          mkdir -p reports docs
          python3 mf_ai_engine.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mf-report-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn
          retention-days: 90